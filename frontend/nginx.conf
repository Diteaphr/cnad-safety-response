server {
    listen       3000;
    server_name  localhost;

    # Set root directory for static files
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # GZIP rules for faster load times on slow mobile networks
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_proxied any;

    # API 與瀏覽器同源時（VITE_API_URL 留空），經由此處轉發到後端容器。
    # 勿用「變數 + proxy_pass 含 URI」寫法：nginx 對該組合的路徑改寫有陷阱，會把 /api/auth/login 轉成後端 404。
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Critical for PWA & Single Page Apps (React Router)
        try_files $uri $uri/ /index.html;
    }

    # Keep app shell and SW files fresh so deployments are visible immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    location ~* ^/workbox-.+\.js$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }

    # Vite 已對 JS/CSS 做內容雜湊檔名；長期強快取易造成「程式已改版、瀏覽器／PWA 仍跑舊包」，
    # Docker 本機反覆調整時尤其明顯。改為每次都向伺服器確認（可依 304），避免卡住舊邏輯。
    location ^~ /assets/ {
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        access_log off;
    }

    # 其餘靜態（圖示、字型）
    location ~* \.(?:ico|gif|jpe?g|png|woff2?|eot|ttf|otf|svg|mjs)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
    }
}