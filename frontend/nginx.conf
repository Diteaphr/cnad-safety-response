server {
    listen       3000;
    server_name  localhost;

    # Set root directory for static files
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # GZIP rules for faster load times on slow mobile networks
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_proxied any;

    # API 與瀏覽器同源時（VITE_API_URL 留空），經由此處轉發到後端容器
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Critical for PWA & Single Page Apps (React Router)
        try_files $uri $uri/ /index.html;
    }

    # Keep app shell and SW files fresh so deployments are visible immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }

    # Cache static files (CSS/JS/images) aggressively
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|otf|svg|mjs)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000";
    }
}