name: Backend Tests

on:
  workflow_dispatch: # CI disabled for now — enable by restoring push/pull_request triggers

jobs:
  test:
    name: pytest (Python 3.11 + PostgreSQL 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: employee_safety_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      # conftest.py reads TEST_DATABASE_URL first, then falls back to port 15432 (local Docker).
      # In CI we run PostgreSQL on the standard port 5432.
      TEST_DATABASE_URL: postgresql+psycopg://user:password@localhost:5432/employee_safety_test
      # Disable Redis so the test suite doesn't require a Redis service.
      REDIS_ENABLED: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest
